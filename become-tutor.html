<!DOCTYPE html>
<html>

<head>
<title>Become a Tutor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Become a Tutor</h2>

<form onsubmit="saveTutor(event)">

<label>Name:</label><br>
<input type="text" id="name"><br><br>

<label>Subject:</label><br>
<input type="text" id="subject"><br><br>

<label>Experience:</label><br>
<input type="text" id="experience"><br><br>

<label>Location:</label><br>
<input type="text" id="location"><br><br>

<button type="submit">Submit</button>

</form>

<script>
function saveTutor(event) {
event.preventDefault();

let name = document.getElementById("name").value;
let subject = document.getElementById("subject").value;
let experience = document.getElementById("experience").value;
let location = document.getElementById("location").value;

let tutor = {
name: name,
subject: subject,
experience: experience,
location: location
};

let tutors = JSON.parse(localStorage.getItem("tutors")) || [];
tutors.push(tutor);

localStorage.setItem("tutors", JSON.stringify(tutors));

alert("Tutor profile added!");

}
</script></body>
</html>
