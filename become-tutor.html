<h1>Become a Tutor</h1>

<p>Fill the form below to register as a tutor.</p>

<form onsubmit="saveTutor(event)">
  <label>Name:</label><br>
<input type="text" id="name"><br><br>

<input type="text" id="subject"><br><br>

<label>Experience:</label><br>

<label>Name:</label><br>
<input type="text"><br><br>

<p>Registration is currently FREE for early tutors.</p>

<p>Join now and start getting students.</p>
<script>
function saveTutor(event){
event.preventDefault()

let tutor={
name:document.getElementById("name").value,
subject:document.getElementById("subject").value,
experience:document.getElementById("experience").value,
location:document.getElementById("location").value
}

let tutors=JSON.parse(localStorage.getItem("tutors")) || []

tutors.push(tutor)

localStorage.setItem("tutors",JSON.stringify(tutors))

alert("Tutor registered successfully!")

}
</script>
