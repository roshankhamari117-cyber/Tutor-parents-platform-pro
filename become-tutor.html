<form onsubmit="saveTutor(event)">

<label>Name:</label><br>
<input type="text" id="name"><br><br>

<label>Subject:</label><br>
<input type="text" id="subject"><br><br>

<label>Experience:</label><br>
<input type="text" id="experience"><br><br>

<label>Location:</label><br>
<input type="text" id="location"><br><br>

<button type="submit">Submit</button>

</form>
<script>
function saveTutor(event){
event.preventDefault()

let tutor={
name:document.getElementById("name").value,
subject:document.getElementById("subject").value,
experience:document.getElementById("experience").value,
location:document.getElementById("location").value
}

let tutors=JSON.parse(localStorage.getItem("tutors")) || []

tutors.push(tutor)

localStorage.setItem("tutors",JSON.stringify(tutors))

alert("Tutor registered successfully!")
}
</script>
