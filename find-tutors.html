<!DOCTYPE html>
<html>

<head>
<title>Find Tutors</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="find-tutors.html">Find Tutors</a>
<a href="become-tutor.html">Become Tutor</a>
<a href="contact.html">Contact</a>
</div>

<h1>Find Tutors</h1>

<input type="text" id="subjectSearch" placeholder="Search by subject (Math, English...)">

<br><br>

<input type="text" id="locationSearch" placeholder="Search by location (Balangir...)">

<br><br>

<button onclick="searchTutor()">Search</button>

<br><br>

<div id="tutorList"></div>

<script>

let tutors = JSON.parse(localStorage.getItem("tutors")) || []

let tutorList = document.getElementById("tutorList")

function displayTutors(list){

tutorList.innerHTML = ""

list.forEach(function(tutor){

let card = document.createElement("div")

card.className = "tutor"

card.innerHTML = `
<img src="${tutor.photo}" width="120" style="border-radius:10px"><br><br>

<h2 onclick="openTutor('${tutor.phone}')" style="cursor:pointer;color:blue;">
${tutor.name}
</h2><h2 onclick="openTutor('${tutor.phone}')" style="cursor:pointer; color:blue;">
${tutor.name}
</h2>

<p>Subject: ${tutor.subject}</p>
<p>Experience: ${tutor.experience}</p>
<p>Qualification: ${tutor.qualification}</p>
<p>Class: ${tutor.class}</p>
<p>Location: ${tutor.location}</p>
<p>Phone: ${tutor.phone}</p>

<a href="https://wa.me/${tutor.phone}" target="_blank">
<button>Contact on WhatsApp</button>
</a>
`

tutorList.appendChild(card)

})

}

displayTutors(tutors)

function searchTutor(){

let subject = document.getElementById("subjectSearch").value.toLowerCase()

let location = document.getElementById("locationSearch").value.toLowerCase()

let filtered = tutors.filter(function(tutor){

return tutor.subject.toLowerCase().includes(subject) &&
       tutor.location.toLowerCase().includes(location)

})

displayTutors(filtered)

}

</script>
