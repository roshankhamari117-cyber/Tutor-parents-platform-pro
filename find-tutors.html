<!DOCTYPE html>
<html>

<head>
<title>Tutor Profile</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="find-tutors.html">Find Tutors</a>
<a href="become-tutor.html">Become Tutor</a>
<a href="contact.html">Contact</a>
</div>

<h1>Tutor Profile</h1>

<div id="profile"></div>

<script>

let tutors = JSON.parse(localStorage.getItem("tutors")) || []

let selectedPhone = localStorage.getItem("selectedTutor")

let tutor = tutors.find(function(t){
return t.phone === selectedPhone
})

let profile = document.getElementById("profile")

if(tutor){

profile.innerHTML = `
<div class="tutor">

<img src="${tutor.photo}" width="150" style="border-radius:10px"><br><br>

<h2>${tutor.name}</h2>

<p><b>Subject:</b> ${tutor.subject}</p>
<p><b>Experience:</b> ${tutor.experience}</p>
<p><b>Qualification:</b> ${tutor.qualification}</p>
<p><b>Class:</b> ${tutor.class}</p>
<p><b>Location:</b> ${tutor.location}</p>
<p><b>Phone:</b> ${tutor.phone}</p>

<a href="https://wa.me/${tutor.phone}" target="_blank">
<button>Contact on WhatsApp</button>
</a>

</div>
`

}

</script>

<br><br>

<a href="find-tutors.html">⬅ Back to Tutors</a>

</body>

</html>
